services:
  watchlist-cleanarr:
    build: .
    container_name: watchlist-cleanarr
    restart: unless-stopped
    ports:
      - "${WEBHOOK_PORT:-5000}:5000"
    environment:
      # Plex Media Server URL (reachable from inside the container)
      PLEX_URL: "http://host.docker.internal:32400"
      # X-Plex-Token of the Plex Home administrator
      PLEX_TOKEN: "your-plex-token-here"
      # Optional: PIN for protected Plex Home users
      PLEX_HOME_USER_PIN: ""
      # Webhook listen port inside the container (fixed at 5000)
      WEBHOOK_PORT: "5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
