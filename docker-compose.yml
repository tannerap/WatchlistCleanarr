services:
  watchlist-cleanarr:
    build: .
    container_name: watchlist-cleanarr
    restart: unless-stopped
    ports:
      - "${WEBHOOK_PORT:-8788}:8788"
    volumes:
      - watchlist-cleanarr-data:/data
    environment:
      # Plex per Docker-DNS (gleiches Netzwerk wie der Plex-Container)
      PLEX_URL: "http://plex:32400"
      # Nur beim ERSTEN Start setzen – danach aus compose entfernen (wird nach /data/config.env geschrieben)
      PLEX_TOKEN: "your-plex-token-here"
      WEBHOOK_API_KEY: "your-webhook-api-key-here"
      PLEX_HOME_USER_PIN: ""
      CONFIG_DIR: "/data"
      WEBHOOK_PORT: "8788"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8788/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - media

volumes:
  watchlist-cleanarr-data:

networks:
  media:
    external: true
